name: Sabagiro
options:
  bundleIdPrefix: ge.sabagiro
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    # Set your Apple ID team in Xcode → Signing (do not commit personal team id)
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  Sabagiro:
    type: application
    platform: iOS
    sources:
      - path: Sabagiro
        excludes:
          - "**/*.md"
    resources:
      - Sabagiro/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ge.sabagiro.app
        INFOPLIST_KEY_CFBundleDisplayName: Sabagiro
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Sabagiro/Info.plist
      properties:
        CFBundleDisplayName: Sabagiro
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes: []
